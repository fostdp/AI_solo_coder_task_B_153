upstream backend_api {
    server backend:3000;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve pre-compressed gzip files first
    location ~* \.(html|css|js|svg|json)$ {
        try_files $uri.gz $uri =404;
        add_header Content-Encoding gzip;
        add_header Vary Accept-Encoding;
    }

    # API reverse proxy with CORS
    location /api/ {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        # CORS headers
        add_header Access-Control-Allow-Origin  $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Prometheus metrics pass-through
    location /metrics {
        proxy_pass         http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri.gz $uri =404;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
