global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: spindle-monitoring
    replica: "1"

scrape_configs:
  - job_name: spindle-backend
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["backend:3000"]
        labels:
          service: spindle-backend
    scrape_interval: 10s
    scrape_timeout: 8s

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
